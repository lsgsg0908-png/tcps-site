<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCPS Smart Entry AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #020612;
      --bg-2: #071120;
      --panel: rgba(7, 14, 30, 0.92);
      --panel-2: rgba(2, 8, 20, 0.96);
      --line: rgba(120, 160, 255, 0.12);
      --text: #eef4ff;
      --muted: #8fa3c4;
      --blue: #8fd2ff;
      --green: #9affd7;
      --red: #ff456d;
      --purple: #8d5cff;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 18% 85%, rgba(0, 255, 200, 0.08), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(94, 89, 255, 0.12), transparent 30%),
        linear-gradient(180deg, #01040b 0%, #020814 100%);
    }

    .engine-wrap {
      width: 100%;
      max-width: 1160px;
      border-radius: 34px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(17, 23, 43, 0.94), rgba(3, 10, 22, 0.98));
      border: 1px solid rgba(127, 148, 255, 0.14);
      box-shadow:
        inset 0 0 0 1px rgba(120, 150, 255, 0.04),
        0 22px 60px rgba(0, 0, 0, 0.42);
    }

    .engine-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 86%, rgba(0, 255, 191, 0.08), transparent 24%),
        radial-gradient(circle at 78% 12%, rgba(102, 91, 255, 0.10), transparent 28%);
    }

    .engine-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 0.96fr 1.3fr;
      gap: 18px;
      align-items: stretch;
    }

    .engine-panel {
      background: linear-gradient(180deg, rgba(0, 8, 22, 0.96), rgba(0, 7, 18, 0.98));
      border: 1px solid rgba(100, 160, 255, 0.10);
      border-radius: 28px;
      box-shadow:
        inset 0 0 0 1px rgba(80, 140, 255, 0.03),
        0 0 28px rgba(0, 0, 0, 0.14);
    }

    .engine-left {
      padding: 26px;
      display: flex;
      flex-direction: column;
      min-height: 560px;
    }

    .engine-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }

    .engine-title {
      font-size: 18px;
      font-weight: 800;
      color: #f4f7ff;
      letter-spacing: -0.4px;
      white-space: nowrap;
    }

    .engine-badge {
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      color: var(--green);
      background: rgba(44, 100, 85, 0.28);
      border: 1px solid rgba(130, 255, 210, 0.24);
      box-shadow: inset 0 0 18px rgba(50, 255, 190, 0.08);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hero-panel {
      min-height: 150px;
      padding: 22px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .status-list {
      display: grid;
      gap: 13px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .status-label {
      font-size: 15px;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-value {
      min-width: 96px;
      text-align: right;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      white-space: nowrap;
    }

    .hero-right {
      min-height: 92px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      text-align: right;
    }

    .hero-main {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: 26px;
      font-weight: 900;
      line-height: 1.12;
      color: var(--blue);
      letter-spacing: -0.8px;
      white-space: nowrap;
    }

    .hero-sub {
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 10px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      white-space: nowrap;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .mini-panel {
      min-height: 108px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .mini-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .mini-value {
      min-height: 24px;
      display: flex;
      align-items: center;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
      white-space: nowrap;
    }

    .bottom-panel {
      min-height: 120px;
      padding: 22px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: center;
      margin-top: auto;
    }

    .bottom-left {
      display: grid;
      gap: 12px;
    }

    .bottom-label {
      font-size: 14px;
      color: var(--muted);
    }

    .bottom-right {
      min-height: 58px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      text-align: right;
    }

    .bottom-main,
    .bottom-sub {
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      white-space: nowrap;
      font-weight: 900;
      color: #fff;
    }

    .bottom-main {
      font-size: 18px;
    }

    .bottom-sub {
      font-size: 16px;
      margin-top: 8px;
    }

    .engine-right {
      padding: 0;
      min-height: 560px;
      overflow: hidden;
      position: relative;
    }

    .engine-visual {
      position: relative;
      height: 100%;
      min-height: 560px;
      border-radius: 28px;
      overflow: hidden;
    }

    .chart-frame {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 560px;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 78% 34%, rgba(255, 74, 114, 0.10), transparent 18%),
        radial-gradient(circle at 22% 70%, rgba(118, 59, 255, 0.08), transparent 22%),
        linear-gradient(180deg, rgba(3, 9, 24, 0.98), rgba(1, 6, 18, 1));
      border: 1px solid rgba(121, 95, 255, 0.18);
      box-shadow:
        inset 0 0 0 1px rgba(130, 150, 255, 0.03),
        0 20px 40px rgba(0, 0, 0, 0.24);
    }

    .chart-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(111, 132, 196, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(111, 132, 196, 0.08) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.38;
      pointer-events: none;
    }

    .chart-fade {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        90deg,
        rgba(2, 8, 20, 0.98) 0%,
        rgba(2, 8, 20, 0.84) 18%,
        rgba(2, 8, 20, 0.34) 36%,
        rgba(2, 8, 20, 0.08) 56%,
        rgba(2, 8, 20, 0) 72%
      );
    }

    .zone {
      position: absolute;
      left: 0;
      width: 58%;
      border: 1px solid rgba(154, 100, 255, 0.42);
      border-radius: 14px;
      background: linear-gradient(90deg, rgba(104, 54, 255, 0.05), rgba(104, 54, 255, 0.01));
      box-shadow: inset 0 0 18px rgba(143, 92, 255, 0.04);
      pointer-events: none;
    }

    .zone-top {
      top: 44px;
      height: 68px;
    }

    .zone-mid {
      top: 244px;
      left: 4%;
      width: 48%;
      height: 60px;
      opacity: 0.55;
    }

    .zone-bottom {
      bottom: 84px;
      height: 62px;
    }

    .chart-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .trend-line {
      stroke: rgba(153, 92, 255, 0.95);
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      filter: drop-shadow(0 0 10px rgba(141, 92, 255, 0.34));
    }

    .price-line-glow {
      fill: none;
      stroke: rgba(255, 69, 109, 0.22);
      stroke-width: 11;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: blur(7px);
    }

    .price-line {
      fill: none;
      stroke: #ff456d;
      stroke-width: 4.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 8px rgba(255, 69, 109, 0.70))
        drop-shadow(0 0 16px rgba(255, 69, 109, 0.22));
    }

    .price-dot {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(255, 69, 109, 0.92);
      box-shadow:
        0 0 0 8px rgba(255, 69, 109, 0.16),
        0 0 22px rgba(255, 69, 109, 0.48);
      transform: translate(-50%, -50%);
      animation: pulseDot 1.05s ease-in-out infinite;
      pointer-events: none;
      z-index: 4;
    }

    .chart-nav {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.85);
      font-size: 34px;
      line-height: 1;
      z-index: 5;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 10px 24px rgba(0, 0, 0, 0.22);
    }

    @keyframes pulseDot {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.18);
        opacity: 0.74;
      }
    }

    @media (max-width: 980px) {
      .engine-grid {
        grid-template-columns: 1fr;
      }

      .engine-left,
      .engine-right,
      .engine-visual,
      .chart-frame {
        min-height: auto;
      }

      .engine-right {
        min-height: 420px;
      }

      .engine-visual,
      .chart-frame {
        min-height: 420px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .engine-wrap {
        padding: 16px;
        border-radius: 24px;
      }

      .engine-left {
        padding: 18px;
        min-height: auto;
      }

      .hero-panel,
      .bottom-panel,
      .mini-grid {
        grid-template-columns: 1fr;
      }

      .hero-right,
      .bottom-right {
        align-items: flex-start;
        text-align: left;
      }

      .hero-main,
      .hero-sub,
      .bottom-main,
      .bottom-sub {
        justify-content: flex-start;
        white-space: normal;
      }

      .mini-value,
      .status-value {
        white-space: normal;
      }

      .engine-title {
        font-size: 16px;
      }

      .engine-badge {
        font-size: 12px;
        padding: 8px 12px;
      }

      .engine-right {
        min-height: 360px;
      }

      .engine-visual,
      .chart-frame {
        min-height: 360px;
      }

      .chart-nav {
        width: 46px;
        height: 46px;
        font-size: 28px;
        right: 16px;
      }
    }
  </style>
</head>
<body>
  <section class="engine-wrap">
    <div class="engine-grid">
      <div class="engine-panel engine-left">
        <div class="engine-top">
          <div class="engine-title">TCPS 스마트 엔트리 AI</div>
          <div class="engine-badge">엔진 온라인</div>
        </div>

        <div class="engine-panel hero-panel">
          <div class="status-list">
            <div class="status-row">
              <div class="status-label">엔진 상태</div>
              <div class="status-value" id="engineState">시장 분석 활성</div>
            </div>
            <div class="status-row">
              <div class="status-label">실행 상태</div>
              <div class="status-value" id="runState">확인 대기 중</div>
            </div>
            <div class="status-row">
              <div class="status-label">스캔 상태</div>
              <div class="status-value" id="scanState">구조 확인</div>
            </div>
          </div>

          <div class="hero-right">
            <div class="hero-main" id="heroMain">시장 분석 활성</div>
            <div class="hero-sub" id="heroSub">확인 대기 중</div>
          </div>
        </div>

        <div class="mini-grid">
          <div class="engine-panel mini-panel">
            <div class="mini-label">시장</div>
            <div class="mini-value" id="marketValue">비트코인 USDT</div>
          </div>

          <div class="engine-panel mini-panel">
            <div class="mini-label">체계 필터</div>
            <div class="mini-value" id="filterValue">트렌드 액티브</div>
          </div>

          <div class="engine-panel mini-panel">
            <div class="mini-label">유동성 모델</div>
            <div class="mini-value" id="liquidityValue">모니터링</div>
          </div>

          <div class="engine-panel mini-panel">
            <div class="mini-label">최종 업데이트</div>
            <div class="mini-value" id="updateValue">방금</div>
          </div>
        </div>

        <div class="engine-panel bottom-panel">
          <div class="bottom-left">
            <div class="bottom-label">엔진 로직</div>
            <div class="bottom-label">우선 사항</div>
          </div>

          <div class="bottom-right">
            <div class="bottom-main" id="logicMain">강제 거래는 없습니다</div>
            <div class="bottom-sub" id="logicSub">선택적 실행만</div>
          </div>
        </div>
      </div>

      <div class="engine-panel engine-right">
        <div class="engine-visual">
          <div class="chart-frame">
            <div class="chart-grid"></div>
            <div class="chart-fade"></div>

            <div class="zone zone-top"></div>
            <div class="zone zone-mid"></div>
            <div class="zone zone-bottom"></div>

            <svg class="chart-svg" viewBox="0 0 640 560" preserveAspectRatio="none">
              <line class="trend-line" x1="18" y1="116" x2="392" y2="42"></line>
              <line class="trend-line" x1="0" y1="390" x2="408" y2="462"></line>
              <polyline id="priceLineGlow" class="price-line-glow" points=""></polyline>
              <polyline id="priceLine" class="price-line" points=""></polyline>
            </svg>

            <div id="priceDot" class="price-dot"></div>
            <div class="chart-nav">›</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const dashboardFrames = [
      {
        engineState: "시장 분석 활성",
        runState: "확인 대기 중",
        scanState: "구조 확인",
        heroMain: "시장 분석 활성",
        heroSub: "확인 대기 중",
        marketValue: "비트코인 USDT",
        filterValue: "트렌드 액티브",
        liquidityValue: "모니터링",
        updateValue: "방금",
        logicMain: "강제 거래는 없습니다",
        logicSub: "선택적 실행만"
      },
      {
        engineState: "유동성 스윕 감지",
        runState: "조건 선별 중",
        scanState: "박스권 추적",
        heroMain: "유동성 스윕 감지",
        heroSub: "조건 선별 중",
        marketValue: "비트코인 USDT",
        filterValue: "범위 필터 적용",
        liquidityValue: "스윕 확인",
        updateValue: "3초 전",
        logicMain: "노이즈 구간은 제외",
        logicSub: "확정 구간만 실행"
      },
      {
        engineState: "추세 재정렬 감시",
        runState: "진입 대기 유지",
        scanState: "타이밍 압축",
        heroMain: "추세 재정렬 감시",
        heroSub: "진입 대기 유지",
        marketValue: "비트코인 USDT",
        filterValue: "리스크 억제 중",
        liquidityValue: "되돌림 추적",
        updateValue: "7초 전",
        logicMain: "빈도보다 확인 우선",
        logicSub: "명확한 구간만 선택"
      },
      {
        engineState: "가짜 이탈 확인",
        runState: "반응 구간 분석",
        scanState: "복귀 흐름 점검",
        heroMain: "가짜 이탈 확인",
        heroSub: "반응 구간 분석",
        marketValue: "비트코인 USDT",
        filterValue: "횡보 차단 활성",
        liquidityValue: "구조 복귀 감지",
        updateValue: "방금",
        logicMain: "불필요한 진입 제한",
        logicSub: "선명한 구조만 유지"
      }
    ];

    const fieldIds = [
      "engineState",
      "runState",
      "scanState",
      "heroMain",
      "heroSub",
      "marketValue",
      "filterValue",
      "liquidityValue",
      "updateValue",
      "logicMain",
      "logicSub"
    ];

    let dashboardIndex = 0;

    function applyDashboardFrame(frame) {
      fieldIds.forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.textContent = frame[id];
      });
    }

    applyDashboardFrame(dashboardFrames[0]);

    setInterval(() => {
      dashboardIndex = (dashboardIndex + 1) % dashboardFrames.length;
      applyDashboardFrame(dashboardFrames[dashboardIndex]);
    }, 2200);

    const line = document.getElementById("priceLine");
    const glow = document.getElementById("priceLineGlow");
    const dot = document.getElementById("priceDot");

    const WIDTH = 640;
    const HEIGHT = 560;

    const basePoints = [
      [0, 250],
      [56, 248],
      [102, 256],
      [148, 276],
      [194, 308],
      [240, 336],
      [286, 342],
      [330, 328],
      [370, 286],
      [410, 214],
      [454, 132],
      [500, 92],
      [540, 88],
      [580, 112],
      [610, 146]
    ];

    function buildAnimatedPoints(t) {
      return basePoints.map((point, i) => {
        const x = point[0];
        let y = point[1];

        if (i > 1 && i < 7) {
          y += Math.sin(t * 1.55 + i * 0.8) * 7;
        }

        if (i >= 7 && i < 11) {
          y += Math.sin(t * 2.1 + i * 0.65) * 15;
        }

        if (i >= 11) {
          y += Math.sin(t * 2.6 + i * 0.9) * 18;
        }

        if (i === basePoints.length - 1) {
          y += Math.sin(t * 3.6) * 22;
        }

        if (i === basePoints.length - 2) {
          y += Math.sin(t * 3.2 + 0.4) * 16;
        }

        return [x, y];
      });
    }

    function drawChart(points) {
      const pointsString = points.map(([x, y]) => `${x},${y}`).join(" ");
      line.setAttribute("points", pointsString);
      glow.setAttribute("points", pointsString);

      const last = points[points.length - 1];
      const frame = document.querySelector(".chart-frame");
      const rect = frame.getBoundingClientRect();

      const xPercent = last[0] / WIDTH;
      const yPercent = last[1] / HEIGHT;

      dot.style.left = `${xPercent * rect.width}px`;
      dot.style.top = `${yPercent * rect.height}px`;
    }

    let start = null;

    function animate(ts) {
      if (!start) start = ts;
      const t = (ts - start) / 1000;
      const points = buildAnimatedPoints(t);
      drawChart(points);
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    window.addEventListener("resize", () => {
      const t = performance.now() / 1000;
      drawChart(buildAnimatedPoints(t));
    });
  </script>
</body>
</html>
