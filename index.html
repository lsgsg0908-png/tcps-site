  color: white;

<body>

<canvas id="bg"></canvas>

<div class="container">
  <h1>AI-Powered Trade Signals</h1>
  <p>TCPS Smart Entry AI helps traders find high probability entry points using liquidity-based logic.</p>

    <a class="btn secondary" href="https://nowpayments.io/payment/?iid=5068278820" target="_blank">Lifetime - 399 USDT</a>
  </div>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const particles = [];
const COUNT = 130;

for (let i = 0; i < COUNT; i++) {
  const speed = 0.15 + Math.random() * 0.9;
  const angle = Math.random() * Math.PI * 2;
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    size: 1.5 + Math.random() * 2.2,
    color: Math.random() > 0.5 ? "mint" : "blue",
    pulse: Math.random() * Math.PI * 2,
    drift: 0.002 + Math.random() * 0.01,
    glow: 6 + Math.random() * 10
  });
}

function draw() {
  ctx.fillStyle = "rgba(2,3,9,0.22)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];

    p.pulse += p.drift;

    p.vx += (Math.random() - 0.5) * 0.03;
    p.vy += (Math.random() - 0.5) * 0.03;

    const maxSpeed = 1.4;
    const currentSpeed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (currentSpeed > maxSpeed) {
      p.vx = (p.vx / currentSpeed) * maxSpeed;
      p.vy = (p.vy / currentSpeed) * maxSpeed;
    }

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    const alpha = 0.45 + Math.sin(p.pulse) * 0.25;
    const color = p.color === "mint"
      ? `rgba(25,240,193,${alpha})`
      : `rgba(43,140,255,${alpha})`;

    ctx.beginPath();
    ctx.fillStyle = color;
    ctx.shadowBlur = p.glow;
    ctx.shadowColor = color;
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    for (let j = i + 1; j < particles.length; j++) {
      const p2 = particles[j];
      const dx = p.x - p2.x;
      const dy = p.y - p2.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 140) {
        const lineAlpha = (1 - dist / 140) * 0.28;
        const lineColor = p.color === "mint"
          ? `rgba(25,240,193,${lineAlpha})`
          : `rgba(43,140,255,${lineAlpha})`;

        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 0.45;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }
  }

  ctx.shadowBlur = 0;
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
