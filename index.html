<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Z1 SYSTEM</title>
<style>
body{font-family:Arial;background:#0b0f1a;color:#fff;text-align:center}
.container{max-width:400px;margin:80px auto}
input,button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px}
button{background:#4facfe;color:#fff;font-weight:bold}
.hidden{display:none}
</style>
</head>

<body>

<div class="container" id="auth">
<h2>Z1 Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div class="container hidden" id="dashboard">
<h2>Dashboard</h2>
<p id="plan">Plan: NONE</p>

<h3>Submit Payment</h3>
<input id="txid" placeholder="TXID">
<select id="planSelect">
<option value="BASIC">BASIC (49)</option>
<option value="PRO">PRO (99)</option>
<option value="ELITE">ELITE (199)</option>
<option value="LIFETIME">LIFETIME (399)</option>
</select>
<button onclick="submitPayment()">Submit</button>

<button onclick="logout()">Logout</button>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")||"{}");
let currentUser = null;

function register(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;
    if(!email || !pass){alert("fill");return;}
    users[email] = {password:pass, plan:"NONE"};
    localStorage.setItem("users",JSON.stringify(users));
    alert("registered");
}

function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;
    if(users[email] && users[email].password===pass){
        currentUser = email;
        document.getElementById("auth").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        updatePlan();
    }else{
        alert("wrong");
    }
}

function logout(){
    currentUser=null;
    document.getElementById("auth").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
}

function submitPayment(){
    let txid=document.getElementById("txid").value;
    let plan=document.getElementById("planSelect").value;
    if(!txid){alert("txid required");return;}

    // 실제로는 서버 검증 필요
    users[currentUser].plan=plan;
    localStorage.setItem("users",JSON.stringify(users));
    updatePlan();
    alert("Plan activated (mock)");
}

function updatePlan(){
    document.getElementById("plan").innerText="Plan: "+users[currentUser].plan;
}
</script>

</body>
</html>
