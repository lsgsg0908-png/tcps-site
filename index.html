<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TCPS Liquidity Engine</title>
</head>
<body>

<!-- 기존 버튼 (ID 중요) -->
<button id="loginBtn" onclick="goLogin()">Login</button>
<button id="registerBtn" onclick="goRegister()">Register</button>

<script>
function goRegister(){
  window.location.href = "http://34.50.56.156/register.html";
}
function goLogin(){
  window.location.href = "http://34.50.56.156/login.html";
}
</script>

<!-- 🔥 로그인 상태 처리 (최종 완성) -->
<script>
const params = new URLSearchParams(window.location.search);
const user = params.get("user");

if(user){
  localStorage.setItem("user", user);
  window.history.replaceState({}, document.title, "/");
}

window.addEventListener("DOMContentLoaded", () => {
  const u = localStorage.getItem("user");

  if(u){
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");

    if(loginBtn) loginBtn.style.display = "none";
    if(registerBtn) registerBtn.innerText = u;
  }
});
</script>

</body>
</html>
