<!-- FINAL HOMEPAGE LOGIN FIX SCRIPT -->
<script>
function goRegister(){
  window.location.href = "http://34.50.56.156:5000/register.html";
}
function goLogin(){
  window.location.href = "http://34.50.56.156:5000/login.html";
}

// 방문자 카운트
fetch("http://34.50.56.156:5000/api/visit", { method: "POST" }).catch(() => {});

// 로그인 상태 처리
(function(){
  const params = new URLSearchParams(window.location.search);
  const fromUrlUser = params.get("user");

  if(fromUrlUser){
    localStorage.setItem("tcps_user_email", fromUrlUser);
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, "", cleanUrl);
  }

  const savedUser = localStorage.getItem("tcps_user_email");
  const memberLabel = document.getElementById("memberLabel");
  const logoutBtn = document.getElementById("logoutBtn");
  const loginBtn = document.getElementById("loginBtn");
  const registerBtn = document.getElementById("registerBtn");

  if(savedUser){
    if(memberLabel) memberLabel.innerHTML = `<strong>${savedUser}</strong>`;
    if(logoutBtn) logoutBtn.style.display = "inline-block";
    if(loginBtn) loginBtn.style.display = "none";
    if(registerBtn) registerBtn.style.display = "none";
  }
})();

function logout(){
  localStorage.removeItem("tcps_user_email");
  window.location.href = "https://lsgsg0908-png.github.io/tcps-site/";
}
</script>
